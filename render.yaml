services:
  - type: web
    name: pos-billing-system
    runtime: node
    buildCommand: npm install && npm run build && npx prisma db push --schema=database/schema/schema.prisma --accept-data-loss && node database/schema/seed.js
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: DATABASE_URL
        sync: false # User will provide this in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
